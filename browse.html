<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Browse — UI Patterns</title>
  <style>
    * {
      box-sizing: border-box;
    }

    .card:hover {
      box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2);
    }

    html,
    body {
      height: 100vh;
      margin: 0;
      width: 100vw;
    }

    body {
      display: flex;
      flex-direction: column;
      background-color: gainsboro;
    }

    nav {
      background-color: blueviolet;
      flex-grow: 1;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    nav > h1 {
      flex: 1;
      text-align: center;
      color: white;
      margin: 0;
      padding: 10px 0;
    }

    .back-link {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.85;
      white-space: nowrap;
    }

    .back-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    article {
      display: flex;
      justify-content: flex-start;
      padding: 10px;
      align-items: center;
      gap: 40px;
      height: 60px;
    }

    button {
      border: none;
      box-shadow: -1px 10px 11px -7px rgba(0, 0, 0, 0.65);
      height: 25px;
      width: 120px;
      border-radius: 10px;
      color: white;
      background-color: blueviolet;
    }

    button:hover {
      background-color: white;
      color: blueviolet;
    }

    button:disabled {
      background-color: dimgrey;
      color: linen;
      opacity: 1;
    }

    button:disabled:hover {
      background-color: dimgrey;
      color: linen;
      opacity: 1;
    }

    main {
      display: flex;
      flex-direction: row;
      padding: 5px;
      flex-grow: 10;
      max-height: 80vh;
    }

    section {
      padding: 5px;
      display: flex;
      flex-grow: 8;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      flex-direction: row;
      max-height: 100%;
      overflow-y: scroll;
    }

    aside {
      flex-grow: 3;
      min-width: 300px;
      padding: 10px;
      gap: 10px;
      display: flex;
      flex-direction: column;
      max-height: 100%;
      overflow-y: scroll;
      overflow-x: hidden;
    }

    .item {
      height: 100px;
      width: 100%;
      background-color: white;
      border-radius: 10px;
      padding: 5px;
      text-align: left;
    }

    .card {
      padding: 5px;
      text-align: center;
      background-color: white;
      border-radius: 15px;
      flex-grow: 1;
      box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>
  <nav>
    <a class="back-link" href="index.html">← Home</a>
    <h1>Poke Browse</h1>
  </nav>
  <main>
    <section id="result">
    </section>
    <aside id="favourites">
    </aside>
  </main>
  <article>
    <button id="prev" onclick="getDetails(-8)">Prev</button>
    <button id="next" onclick="getDetails(8)">Next</button>
  </article>
</body>

<script>
  let result = document.querySelector('#result');
  let next = document.querySelector('#next');
  let prev = document.querySelector('#prev');

  let curIndex = 1;
  let favourites = [];
  let data = [];

  function showLoading() {
    result.innerHTML = "<h1 style='text-align: center'>Loading...</h1>";
    next.disabled = true;
    prev.disabled = true;
  }

  function addFavourite(id) {
    let item = data.find(rec => rec.id == id);
    favourites.push(item);
    renderFavourites();
  }

  function removeFavourite(id) {
    let index = favourites.findIndex(rec => rec.id == id);
    favourites.splice(index, 1);
    renderFavourites();
  }

  function renderPokemon() {
    let html = '';
    for (let rec of data) {
      html += `<div class="card">
        <img style="height:100px; width:100px" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${rec.id}.png" alt="${rec.name}">
        <p>Name: ${rec.name}</p>
        <button onclick="addFavourite(${rec.id})">Add to Favourites</button>
      </div>`;
    }
    result.innerHTML = html;
    next.disabled = false;
    prev.disabled = false;
  }

  function renderFavourites() {
    let favourites_list = document.querySelector('#favourites');
    let html = "";
    for (let rec of favourites) {
      html += `
      <div class="item">
        <p>Pokemon: ${rec.name}</p>
        <button onclick="removeFavourite(${rec.id})">Remove</button>
      </div>`;
    }
    favourites_list.innerHTML = html;
  }

  async function getDetails(offset) {
    curIndex += offset;
    let end = curIndex + 8;
    let item, response;
    data = [];
    showLoading();
    for (let i = curIndex; i < end; i++) {
      response = await fetch(`https://pokedextr.uwista.dev/pokemon/${i}`);
      item = await response.json();
      data.push(item);
    }
    renderPokemon();
  }

  getDetails(0);
</script>

</html>
