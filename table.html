<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Table — UI Patterns</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100vh;
      margin: 0;
      width: 100vw;
      font-family: sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      background-color: gainsboro;
    }

    nav {
      background-color: blueviolet;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    nav > h1 {
      flex: 1;
      text-align: center;
      color: white;
      margin: 0;
      padding: 10px 0;
    }

    .back-link {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.85;
      white-space: nowrap;
    }

    .back-link:hover {
      opacity: 1;
      text-decoration: underline;
    }

    .toolbar {
      padding: 10px 20px;
      background: white;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .toolbar input {
      padding: 6px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
      flex: 1;
      max-width: 340px;
    }

    .toolbar input:focus {
      outline: none;
      border-color: blueviolet;
    }

    main {
      flex: 1;
      padding: 16px 20px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
    }

    thead th {
      background-color: blueviolet;
      color: white;
      padding: 12px 16px;
      text-align: left;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th:hover {
      background-color: #7b2fbe;
    }

    tbody tr {
      border-bottom: 1px solid #eee;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background-color: #f5f0ff;
    }

    tbody td {
      padding: 8px 16px;
      vertical-align: middle;
    }

    .type-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
      font-weight: bold;
      color: white;
      background-color: blueviolet;
      margin: 2px;
    }

    .sort-icon {
      margin-left: 4px;
      font-size: 0.75rem;
    }

    #loading {
      text-align: center;
      padding: 40px;
      font-size: 1.1rem;
      color: #555;
    }
  </style>
</head>

<body>
  <nav>
    <a class="back-link" href="index.html">← Home</a>
    <h1>Pokémon Table</h1>
  </nav>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search by name or type…" oninput="applyFilter()">
  </div>
  <main>
    <div id="loading">Loading…</div>
    <table id="table" style="display:none">
      <thead>
        <tr>
          <th onclick="sortBy('id')"># <span class="sort-icon" id="sort-id">▲</span></th>
          <th style="width:56px">Sprite</th>
          <th onclick="sortBy('name')">Name <span class="sort-icon" id="sort-name"></span></th>
          <th onclick="sortBy('type1')">Type 1 <span class="sort-icon" id="sort-type1"></span></th>
          <th onclick="sortBy('type2')">Type 2 <span class="sort-icon" id="sort-type2"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>
</body>

<script>
  let allData = [];
  let filtered = [];
  let sortCol = 'id';
  let sortAsc = true;

  async function loadData() {
    const promises = [];
    for (let i = 1; i <= 30; i++) {
      promises.push(fetch(`https://pokedextr.uwista.dev/pokemon/${i}`).then(r => r.json()));
    }
    allData = await Promise.all(promises);
    filtered = [...allData];
    render();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('table').style.display = '';
  }

  function applyFilter() {
    const q = document.getElementById('search').value.toLowerCase();
    filtered = allData.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.type1 || '').toLowerCase().includes(q) ||
      (p.type2 || '').toLowerCase().includes(q)
    );
    render();
  }

  function sortBy(col) {
    if (sortCol === col) {
      sortAsc = !sortAsc;
    } else {
      sortCol = col;
      sortAsc = true;
    }
    ['id', 'name', 'type1', 'type2'].forEach(c => {
      const el = document.getElementById('sort-' + c);
      el.textContent = c === sortCol ? (sortAsc ? '▲' : '▼') : '';
    });
    render();
  }

  function render() {
    const sorted = [...filtered].sort((a, b) => {
      let va = a[sortCol] ?? '';
      let vb = b[sortCol] ?? '';
      if (sortCol === 'id') {
        va = +va;
        vb = +vb;
      } else {
        va = String(va).toLowerCase();
        vb = String(vb).toLowerCase();
      }
      return sortAsc ? (va > vb ? 1 : va < vb ? -1 : 0) : (va < vb ? 1 : va > vb ? -1 : 0);
    });

    document.getElementById('tbody').innerHTML = sorted.map(p => `
      <tr>
        <td>${p.id}</td>
        <td><img src="${p.image}" style="height:40px;width:40px" alt="${p.name}"></td>
        <td>${p.name}</td>
        <td>${p.type1 ? `<span class="type-badge">${p.type1}</span>` : '—'}</td>
        <td>${p.type2 ? `<span class="type-badge">${p.type2}</span>` : '—'}</td>
      </tr>
    `).join('');
  }

  loadData();
</script>

</html>
