<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Table</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; }
    nav { background-color: blueviolet; padding: 10px; display: flex; align-items: center; gap: 15px; }
    nav a { color: white; text-decoration: none; border: 2px solid white; padding: 5px 14px; text-align: center; }
    nav h1 { color: white; margin: 0; }
    main { padding: 15px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background-color: #eee; cursor: pointer; }
    th.sort-asc::after { content: ' ↑'; }
    th.sort-desc::after { content: ' ↓'; }
    th.sortable::after { content: ' ↕'; opacity: 0.4; }
    td img { width: 40px; height: 40px; vertical-align: middle; }
    .pagination { padding: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .pagination button, .page-btn { padding: 5px 10px; cursor: pointer; border: 1px solid #ccc; background: white; }
    .page-btn.active { background: blueviolet; color: white; border-color: blueviolet; }
    .pagination button:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <h1>Table</h1>
  </nav>

  <main>
    <table>
      <thead>
        <tr>
          <th class="sortable" data-sort="id" onclick="sortBy('id')">ID</th>
          <th>Image</th>
          <th class="sortable" data-sort="name" onclick="sortBy('name')">Name</th>
          <th class="sortable" data-sort="type1" onclick="sortBy('type1')">Type</th>
          <th class="sortable" data-sort="hp" onclick="sortBy('hp')">HP</th>
          <th class="sortable" data-sort="attack" onclick="sortBy('attack')">Attack</th>
          <th class="sortable" data-sort="defense" onclick="sortBy('defense')">Defense</th>
          <th class="sortable" data-sort="speed" onclick="sortBy('speed')">Speed</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="8">Loading...</td></tr>
      </tbody>
    </table>
    <div class="pagination">
      <button onclick="goToPage(currentPage - 1)" id="prev-btn">Previous</button>
      <div id="page-numbers"></div>
      <button onclick="goToPage(currentPage + 1)" id="next-btn">Next</button>
      <span id="page-info"></span>
    </div>
  </main>

  <script>
    let allPokemon = [];
    let currentPage = 1;
    let itemsPerPage = 10;
    let sortColumn = 'id';
    let sortDirection = 'asc';

    function renderTable() {
      const tbody = document.querySelector('#table-body');
      
      let sorted = [...allPokemon].sort((a, b) => {
        let aVal = a[sortColumn];
        let bVal = b[sortColumn];

        if (typeof aVal === 'string') {
          aVal = aVal.toLowerCase();
          bVal = bVal.toLowerCase();
        }

        if (sortDirection === 'asc') {
          return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
        } else {
          return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
        }
      });

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageData = sorted.slice(start, end);

      let html = '';
      for (let pokemon of pageData) {
        html += `
          <tr>
            <td>#${String(pokemon.id).padStart(3, '0')}</td>
            <td><img src="${pokemon.image}" alt="${pokemon.name}"></td>
            <td>${pokemon.name}</td>
            <td>${pokemon.type1}${pokemon.type2 ? ' / ' + pokemon.type2 : ''}</td>
            <td>${pokemon.hp || 'N/A'}</td>
            <td>${pokemon.attack || 'N/A'}</td>
            <td>${pokemon.defense || 'N/A'}</td>
            <td>${pokemon.speed || 'N/A'}</td>
          </tr>
        `;
      }

      tbody.innerHTML = html;
      updatePagination();
      updateSortIndicators();
    }

    function updatePagination() {
      const totalPages = Math.ceil(allPokemon.length / itemsPerPage);
      const pageInfo = document.querySelector('#page-info');
      const pageNumbers = document.querySelector('#page-numbers');
      const prevBtn = document.querySelector('#prev-btn');
      const nextBtn = document.querySelector('#next-btn');

      pageInfo.textContent = `Page ${currentPage} of ${totalPages} (${allPokemon.length} items)`;

      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;

      let html = '';
      let startPage = Math.max(1, currentPage - 2);
      let endPage = Math.min(totalPages, currentPage + 2);

      if (startPage > 1) {
        html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
        if (startPage > 2) html += `<span>...</span>`;
      }

      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }

      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span>...</span>`;
        html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }

      pageNumbers.innerHTML = html;
    }

    function updateSortIndicators() {
      document.querySelectorAll('th.sortable').forEach(th => {
        th.classList.remove('sort-asc', 'sort-desc');
        if (th.dataset.sort === sortColumn) {
          th.classList.add(sortDirection === 'asc' ? 'sort-asc' : 'sort-desc');
        }
      });
    }

    function sortBy(column) {
      if (sortColumn === column) {
        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        sortColumn = column;
        sortDirection = 'asc';
      }
      currentPage = 1;
      renderTable();
    }

    function goToPage(page) {
      const totalPages = Math.ceil(allPokemon.length / itemsPerPage);
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    }

    async function loadPokemon() {
      for (let i = 1; i <= 50; i++) {
        const response = await fetch(`https://pokedextr.uwista.dev/pokemon/${i}`);
        const data = await response.json();
        allPokemon.push(data);

        if (i % 10 === 0) {
          renderTable();
        }
      }

      renderTable();
    }

    loadPokemon();
  </script>
</body>
</html>
