<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Carousel</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; }
    nav { background-color: blueviolet; padding: 10px; display: flex; align-items: center; gap: 15px; }
    nav a { color: white; text-decoration: none; border: 2px solid white; padding: 5px 14px; text-align: center; }
    nav h1 { color: white; margin: 0; }
    main {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }
    .card {
      border: 1px solid #ccc;
      padding: 20px;
      width: 300px;
      text-align: center;
      background: white;
    }
    .card img { width: 200px; height: 200px; }
    .card h2 { text-transform: capitalize; margin: 10px 0; }
    .card p { margin: 4px 0; }
    article {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 15px;
    }
    button { padding: 8px 20px; cursor: pointer; background: blueviolet; color: white; border: none; }
    button:disabled { background: grey; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <h1>Carousel</h1>
  </nav>
  <main>
    <div class="card" id="slide">
      <p>Loading...</p>
    </div>
  </main>
  <article>
    <button id="prev-btn" onclick="navigate(-1)">Prev</button>
    <button onclick="goToRandom()">Random</button>
    <button id="next-btn" onclick="navigate(1)">Next</button>
  </article>

  <script>
    let allPokemon = [];
    let currentIndex = 0;

    function renderSlide() {
      const slide = document.querySelector('#slide');
      const pokemon = allPokemon[currentIndex];

      if (!pokemon) {
        slide.innerHTML = '<p>Loading...</p>';
        return;
      }

      slide.innerHTML = `
        <img src="${pokemon.image}" alt="${pokemon.name}">
        <h2>${pokemon.name}</h2>
        <p>#${pokemon.id} &nbsp; ${pokemon.type1}${pokemon.type2 ? ' / ' + pokemon.type2 : ''}</p>
        <p>HP: ${pokemon.hp} &nbsp; Attack: ${pokemon.attack} &nbsp; Defense: ${pokemon.defense}</p>
      `;

      document.querySelector('#prev-btn').disabled = currentIndex === 0;
      document.querySelector('#next-btn').disabled = currentIndex === allPokemon.length - 1;
    }

    function navigate(direction) {
      const newIndex = currentIndex + direction;
      if (newIndex < 0 || newIndex >= allPokemon.length) return;
      currentIndex = newIndex;
      renderSlide();
    }

    function goToRandom() {
      currentIndex = Math.floor(Math.random() * allPokemon.length);
      renderSlide();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') navigate(-1);
      if (e.key === 'ArrowRight') navigate(1);
    });

    async function loadPokemon() {
      for (let i = 1; i <= 30; i++) {
        const response = await fetch(`https://pokedextr.uwista.dev/pokemon/${i}`);
        const data = await response.json();
        allPokemon.push(data);
        if (i === 1) renderSlide();
      }
      renderSlide();
    }

    loadPokemon();
  </script>
</body>
</html>
